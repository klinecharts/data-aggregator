<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Data Aggregator · 实时调试示例</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">KLINECHARTS LAB</p>
          <h1>实时聚合调试台</h1>
          <p class="subtitle">模拟逐笔成交，实时观察 OHLCV 数据的形成与闭合。</p>
        </div>
        <div class="live-indicator"><span></span><b id="status-text">运行中</b></div>
      </header>

      <section class="toolbar" aria-label="调试控制">
        <div class="control-group">
          <span>聚合周期</span>
          <div class="period-input">
            <label class="sr-only" for="period-span">周期数值</label>
            <input id="period-span" type="number" min="1" step="1" value="5" inputmode="numeric" />
            <label class="sr-only" for="period-unit">时间单位</label>
            <select id="period-unit">
              <option value="second">秒</option>
              <option value="minute">分钟</option>
              <option value="hour">小时</option>
              <option value="day">日</option>
              <option value="week">周</option>
              <option value="month">月</option>
              <option value="year">年</option>
            </select>
          </div>
        </div>
        <label>
          开始时间
          <input id="start-time" class="start-time-input" type="datetime-local" step="1" required />
        </label>
        <label>
          成交间隔（毫秒）
          <input id="trade-interval" type="number" min="1" max="60000" step="1" value="300" required />
        </label>
        <div class="button-group">
          <button id="toggle-button" class="primary" type="button">暂停</button>
          <button id="step-button" type="button">单步成交</button>
          <button id="next-period-button" type="button">下一个周期</button>
          <button id="reset-button" type="button">应用并重置</button>
        </div>
      </section>

      <section class="panel config-panel" aria-labelledby="aggregator-config-title">
        <div class="panel-heading">
          <div><h2 id="aggregator-config-title">聚合器配置</h2><p>修改后将使用新配置重新开始模拟</p></div>
        </div>
        <div class="config-grid">
          <label>
            utcOffsetMinutes
            <input id="utc-offset-minutes" type="number" step="1" value="480" required />
          </label>
          <fieldset class="merge-options">
            <legend>跨交易日合并</legend>
            <label class="check-option"><input id="merge-second" type="checkbox" />mergeSecondAcrossTradingDay</label>
            <label class="check-option"><input id="merge-minute" type="checkbox" />mergeMinuteAcrossTradingDay</label>
            <label class="check-option"><input id="merge-hour" type="checkbox" />mergeHourAcrossTradingDay</label>
          </fieldset>
          <label class="json-field">
            sessions（JSON，留空表示 24/7）
            <textarea id="sessions" rows="5" spellcheck="false" placeholder='[{"start":"09:30","end":"11:30"},{"start":"13:00","end":"15:00"}]'></textarea>
          </label>
          <label class="json-field">
            tradingCalendar（JSON，需配合 sessions）
            <textarea id="trading-calendar" rows="5" spellcheck="false" placeholder='{"holidays":["2026-01-01"],"extraTradingDays":[],"weekendDays":[0,6]}'></textarea>
          </label>
        </div>
        <p id="config-error" class="config-error" role="alert" hidden></p>
      </section>

      <section class="metrics" aria-label="当前 K 线">
        <article><span>最新价</span><strong id="last-price">—</strong></article>
        <article><span>开盘</span><strong id="open-price">—</strong></article>
        <article><span>最高</span><strong id="high-price">—</strong></article>
        <article><span>最低</span><strong id="low-price">—</strong></article>
        <article><span>成交量</span><strong id="volume">—</strong></article>
      </section>

      <div class="detail-grid">
        <section class="panel">
          <div class="panel-heading">
            <div><h2>最近聚合结果</h2><p>形成中的数据标记为 CURRENT</p></div>
            <code id="virtual-time">—</code>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>时间</th><th>状态</th><th>O</th><th>H</th><th>L</th><th>C</th><th>Volume</th></tr></thead>
              <tbody id="candle-table"></tbody>
            </table>
          </div>
        </section>

        <section class="panel trade-panel">
          <div class="panel-heading"><div><h2>最新逐笔成交</h2><p>可在 <code>main.ts</code> 的 <code>pushTrade()</code> 中打断点</p></div></div>
          <pre id="trade-json">等待成交…</pre>
          <p class="source-hint">页面直接引用 <code>../../src</code>，修改聚合器源码后会自动热更新。</p>
        </section>
      </div>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
